<svg width="300" height="250" xmlns="http://www.w3.org/2000/svg">
  <!-- Sky -->
  <rect width="300" height="80" fill="#87CEEB"/>
  <!-- Cliff -->
  <polygon points="50,80 80,150 20,150" fill="#8B7355"/>
  <polygon points="150,80 180,160 120,160" fill="#A0826D"/>
  <!-- Waterfall -->
  <rect x="145" y="80" width="10" height="120" fill="#87CEEB"/>
  <rect x="140" y="80" width="20" height="120" fill="#B0E0E6" opacity="0.6"/>
  <!-- Pool -->
  <ellipse cx="150" cy="210" rx="60" ry="20" fill="#1E90FF"/>
  <!-- Ground -->
  <rect y="220" width="300" height="30" fill="#228B22"/>
</svg>