<svg width="300" height="250" xmlns="http://www.w3.org/2000/svg">
  <!-- Sky -->
  <rect width="300" height="150" fill="#E0FFFF"/>
  <!-- Sun -->
  <circle cx="250" cy="40" r="35" fill="#FF8C00"/>
  <!-- Sand dunes -->
  <ellipse cx="80" cy="160" rx="60" ry="30" fill="#DEB887"/>
  <ellipse cx="200" cy="180" rx="70" ry="35" fill="#D2B48C"/>
  <ellipse cx="300" cy="165" rx="50" ry="25" fill="#DEB887"/>
  <!-- Cactus -->
  <rect x="145" y="140" width="10" height="60" fill="#6B8E23"/>
  <rect x="135" y="160" width="10" height="15" fill="#6B8E23"/>
  <rect x="155" y="165" width="10" height="15" fill="#6B8E23"/>
  <!-- Ground -->
  <rect y="200" width="300" height="50" fill="#CD853F"/>
</svg>