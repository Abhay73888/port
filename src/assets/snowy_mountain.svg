<svg width="300" height="250" xmlns="http://www.w3.org/2000/svg">
  <!-- Sky -->
  <rect width="300" height="150" fill="#B0E0E6"/>
  <!-- Snowy mountains -->
  <polygon points="30,150 100,40 170,150" fill="#FFFAFA"/>
  <polygon points="80,150 180,50 280,150" fill="#F0F8FF"/>
  <polygon points="200,150 280,80 300,150" fill="#FFFAFA"/>
  <!-- Snow caps -->
  <polygon points="100,50 90,80 110,80" fill="#fff"/>
  <polygon points="180,50 165,85 195,85" fill="#fff"/>
  <!-- Ground snow -->
  <rect y="150" width="300" height="100" fill="#F5F5F5"/>
  <!-- Pine trees -->
  <polygon points="50,140 45,155 55,155" fill="#228B22"/>
  <polygon points="250,135 245,155 255,155" fill="#228B22"/>
</svg>