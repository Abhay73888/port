<svg width="300" height="250" xmlns="http://www.w3.org/2000/svg">
  <!-- Sky (misty) -->
  <rect width="300" height="80" fill="#90EE90"/>
  <!-- Canopy layers -->
  <ellipse cx="50" cy="90" rx="35" ry="40" fill="#006400"/>
  <ellipse cx="150" cy="80" rx="40" ry="45" fill="#228B22"/>
  <ellipse cx="260" cy="95" rx="35" ry="40" fill="#006400"/>
  <!-- Mid layer -->
  <ellipse cx="80" cy="130" rx="30" ry="35" fill="#228B22"/>
  <ellipse cx="200" cy="125" rx="35" ry="38" fill="#006400"/>
  <!-- Tree trunks -->
  <rect x="145" y="140" width="10" height="110" fill="#8B4513"/>
  <rect x="75" y="145" width="8" height="105" fill="#654321"/>
  <!-- Ground -->
  <rect y="210" width="300" height="40" fill="#654321"/>
</svg>