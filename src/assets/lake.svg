<svg width="300" height="250" xmlns="http://www.w3.org/2000/svg">
  <!-- Sky -->
  <rect width="300" height="130" fill="#ADD8E6"/>
  <!-- Mountains -->
  <polygon points="0,130 80,60 150,130" fill="#696969"/>
  <polygon points="100,130 180,50 260,130" fill="#808080"/>
  <polygon points="200,130 280,80 300,130" fill="#A9A9A9"/>
  <!-- Lake -->
  <rect y="130" width="300" height="120" fill="#4682B4"/>
  <!-- Reflection -->
  <polygon points="0,130 80,200 150,130" fill="#36648B" opacity="0.7"/>
  <polygon points="100,130 180,205 260,130" fill="#36648B" opacity="0.7"/>
</svg>